<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 2 — Recognition Training</title>
<style>
:root{
  --bg:#030814;
  --bg2:#061120;
  --surface:#071824;
  --surface2:#092333;
  --border:rgba(0,234,255,0.22);
  --border-soft:rgba(255,255,255,0.08);
  --accent:#00eaff;
  --accent2:#00ffc3;
  --green:#7dffbf;
  --warning:#fbbf24;
  --danger:#ff5c7a;
  --pink:#ff4fd8;
  --gold:#ffd36a;
  --chrome:#d8f7ff;
  --text:#e8fbff;
  --text2:#b7d2dc;
  --text3:#73909a;
  --shadow:0 22px 70px rgba(0,0,0,0.42);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:
    radial-gradient(circle at 16% 12%,rgba(0,234,255,0.10),transparent 28%),
    radial-gradient(circle at 84% 80%,rgba(0,255,195,0.07),transparent 30%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:34px 34px;
  pointer-events:none;
  opacity:0.18;
  z-index:0;
}
.app{
  position:relative;
  z-index:1;
  max-width:1080px;
  margin:0 auto;
  padding:28px 22px 60px;
}
.header{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  padding:18px 0 20px;
  background:linear-gradient(180deg,rgba(3,8,20,0.98),rgba(3,8,20,0.72),transparent);
  backdrop-filter:blur(8px);
}
.title-wrap{display:flex;flex-direction:column;gap:5px}
.kicker{color:var(--accent2);font-size:11px;letter-spacing:3px;font-weight:800;text-transform:uppercase}
.title{
  color:var(--accent);
  font-size:clamp(24px,4vw,36px);
  font-weight:900;
  text-shadow:0 0 24px rgba(0,234,255,0.30);
}
.subtitle{color:var(--text2);font-size:14px;line-height:1.65;max-width:780px}
.btn{
  border:1px solid var(--accent);
  color:var(--text);
  background:rgba(0,234,255,0.04);
  padding:11px 16px;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s ease;
  white-space:nowrap;
}
.btn:hover:not(:disabled){
  background:rgba(0,234,255,0.14);
  box-shadow:0 0 24px rgba(0,234,255,0.27);
  transform:translateY(-1px);
}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.primary{
  background:var(--accent);
  color:#001217;
  font-weight:900;
  border:none;
}
.btn.gold{
  border:1px solid rgba(255,211,106,.65);
  background:linear-gradient(135deg,rgba(255,211,106,.22),rgba(255,255,255,.04));
  color:var(--gold);
}
.panel{
  border:1px solid var(--border);
  background:linear-gradient(180deg,rgba(0,234,255,0.055),rgba(0,0,0,0.08)),rgba(7,24,36,0.84);
  border-radius:22px;
  padding:24px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}
.panel h2{color:var(--accent);font-size:26px;margin-bottom:10px}
.panel h3{color:var(--text);font-size:20px;margin-bottom:12px;line-height:1.45}
.panel p{color:var(--text2);line-height:1.72;font-size:15px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}
.pill,.visual-card,.mistake-card{
  border:1px solid var(--border-soft);
  border-radius:16px;
  background:rgba(255,255,255,0.035);
  padding:16px;
}
.pill strong,.visual-card strong{color:var(--accent);display:block;margin-bottom:6px}
.pill span,.visual-card span{color:var(--text2);font-size:13px;line-height:1.55}
.progress-wrap{margin:16px 0 22px}
.progress-top{display:flex;justify-content:space-between;color:var(--text2);font-size:13px;margin-bottom:8px}
.progress-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid var(--border-soft)}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 18px rgba(0,234,255,.45);transition:.25s ease}
.option-list{display:grid;gap:12px;margin-top:18px}
.option{
  width:100%;
  text-align:left;
  border:1px solid rgba(0,234,255,.18);
  background:rgba(0,234,255,.045);
  color:var(--text);
  border-radius:15px;
  padding:15px 16px;
  cursor:pointer;
  transition:.18s ease;
  line-height:1.55;
}
.option:hover:not(:disabled){border-color:rgba(0,234,255,.55);background:rgba(0,234,255,.105);transform:translateY(-1px)}
.option.correct{border-color:rgba(125,255,191,.75);background:rgba(125,255,191,.10)}
.option.partial{border-color:rgba(251,191,36,.75);background:rgba(251,191,36,.10)}
.option.wrong{border-color:rgba(255,92,122,.75);background:rgba(255,92,122,.10)}
.feedback{
  margin-top:18px;
  padding:16px;
  border-radius:15px;
  border:1px solid var(--border-soft);
  background:rgba(0,10,18,0.65);
}
.feedback .ok{color:var(--green);font-weight:800}
.feedback .warn{color:var(--warning);font-weight:800}
.feedback .bad{color:var(--danger);font-weight:800}
.messer{
  margin-top:12px;
  padding:14px 16px;
  background:rgba(0,255,135,0.08);
  border-left:4px solid var(--accent2);
  border-radius:10px;
  color:var(--green);
  line-height:1.7;
}
.actions{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap}
.drag-layout{display:grid;grid-template-columns:1fr 1.25fr;gap:18px;margin-top:18px}
.drag-list{display:grid;gap:12px}
.drag-item,.drop-item{
  border:1px solid var(--border-soft);
  border-radius:15px;
  padding:14px;
  background:rgba(255,255,255,.035);
  min-height:58px;
}
.drag-item{cursor:grab;color:var(--accent);font-weight:800;user-select:none;touch-action:none}
.drag-item.selected{border-color:var(--accent);box-shadow:0 0 18px rgba(0,234,255,.22)}
.drop-item{cursor:pointer;color:var(--text2)}
.drop-item strong{color:var(--text);display:block;margin-bottom:4px}
.drop-item.filled{border-color:rgba(0,234,255,.36)}
.drop-item.over{border-color:var(--accent);box-shadow:0 0 20px rgba(0,234,255,.28);background:rgba(0,234,255,.08)}
.drop-item.good{border-color:rgba(125,255,191,.8);background:rgba(125,255,191,.08)}
.drop-item.bad{border-color:rgba(255,92,122,.8);background:rgba(255,92,122,.08)}
.boss{
  background:
    radial-gradient(circle at 24% 10%,rgba(255,211,106,.18),transparent 28%),
    radial-gradient(circle at 88% 78%,rgba(255,79,216,.10),transparent 30%),
    linear-gradient(180deg,#020204,#08070b 55%,#010103);
  border:1px solid rgba(255,211,106,.42);
  box-shadow:0 0 60px rgba(255,211,106,.16),0 22px 90px rgba(0,0,0,.65);
}
.boss-title{
  font-family:Georgia,serif;
  letter-spacing:2px;
  font-size:clamp(28px,5vw,46px);
  color:var(--gold);
  text-shadow:0 0 18px rgba(255,211,106,.55),0 0 35px rgba(255,79,216,.18);
  margin-bottom:12px;
}
.boss .kicker{color:var(--gold)}
.boss .option{border-color:rgba(255,211,106,.25);background:rgba(255,211,106,.055)}
.boss .option:hover:not(:disabled){border-color:rgba(255,211,106,.65);box-shadow:0 0 22px rgba(255,211,106,.20)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.stat{padding:16px;border:1px solid var(--border-soft);background:rgba(255,255,255,.035);border-radius:16px}
.stat strong{display:block;color:var(--accent);font-size:24px;margin-bottom:5px}
.stat span{color:var(--text2);font-size:13px}
.hidden{display:none}
@media(max-width:820px){
  .header{align-items:flex-start;flex-direction:column}
  .grid3,.grid2,.drag-layout,.stat-row{grid-template-columns:1fr}
  .app{padding:20px 16px 48px}
  .panel{padding:18px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="title-wrap">
      <div class="kicker">SEC+ WEEK 2 · CHAPTER 1</div>
      <div class="title">Phase 2 — Recognition Training</div>
      <div class="subtitle">Adaptive exam training for Data Protection, DLP, data states, roles, regulations, and Security+ trap recognition.</div>
    </div>
    <button class="btn" onclick="goBack()">← Back</button>
  </header>
  <main id="app"></main>
</div>

<script>
const PASSING_SCORE = 80;

let score = 0;
let totalQuestions = 0;
let totalErrors = 0;
let errorMap = {};
let mistakeLog = [];

let phase = "intro";
let currentIndex = 0;
let currentOptions = [];
let selectedOption = null;
let selectedConceptId = null;
let dragAnswers = {};
let checkedDrag = false;
let miniQuestions = [];
let miniIndex = 0;
let bossIndex = 0;
let bossScore = 0;

const app = document.getElementById("app");

function goBack(){
  window.location.href = "../week2.html";
}

function shuffle(array){
  const arr = [...array];
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[s]));
}

function addError(category){
  totalErrors++;
  errorMap[category] = (errorMap[category] || 0) + 1;
}

function logMistake(entry){
  mistakeLog.push({
    phase: entry.phase,
    question: entry.question,
    selected: entry.selected,
    correct: entry.correct,
    category: entry.category,
    trap: entry.trap,
    correctReason: entry.correctReason,
    messer: entry.messer
  });
}

function getCorrectOption(options){
  return options.find(o => o.value === 1);
}

function getPartialOption(options){
  return options.find(o => o.value === 0.5);
}

function renderProgress(label,total,index){
  const pct = Math.round((index / total) * 100);
  return `
    <div class="progress-wrap">
      <div class="progress-top">
        <span>${label}</span>
        <span>${index}/${total}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
  `;
}

function renderIntro(){
  phase = "intro";
  app.innerHTML = `
    <section class="panel">
      <div class="kicker">PHASE 2 UNLOCKED</div>
      <h2>Recognition Training</h2>
      <p>This phase trains the real Security+ skill: identifying the hidden keyword, rejecting the trap, and choosing the most precise answer.</p>
      <div class="grid3">
        <div class="pill"><strong>Phase A</strong><span>Scenario-based recognition with partial-credit traps.</span></div>
        <div class="pill"><strong>Phase B</strong><span>Mixed drag-and-drop matching by concept, not keyword repetition.</span></div>
        <div class="pill"><strong>Phase C</strong><span>Forced trap reasoning until the real confusion is understood.</span></div>
      </div>
      <div class="grid3">
        <div class="pill"><strong>Phase D</strong><span>Realistic Security+ scenarios with visual clues and hidden traps.</span></div>
        <div class="pill"><strong>Adaptive Mini C</strong><span>If you miss anything, your mistakes become reinforcement training.</span></div>
        <div class="pill"><strong>Boss Level</strong><span>Unlocked only with a flawless scoring run.</span></div>
      </div>
      <div class="messer">
        <strong>Unlock Rule:</strong> If you complete all scoring phases without mistakes, you unlock ⚠️ THE BOSS LEVEL ⚠️.
      </div>
      <div class="actions">
        <button class="btn primary" onclick="startPhaseA()">Start Recognition Training</button>
      </div>
    </section>
  `;
}

/* ===================== DATA ===================== */

const phaseA = [
  {
    q:"A business executive decides that payroll records must be labeled Confidential and protected with encryption at rest and in transit. That role/control/state/concept is:",
    category:"role_confusion",
    messer:"Data Owner = business executive who determines classification and protection requirements. Data Custodian = IT implementation.",
    whyCorrect:"The key phrase is decides that payroll records must be labeled. Classification authority belongs to the Data Owner.",
    partialWhy:"A Data Controller can decide why and how personal data is processed, but this scenario is about internal classification and protection requirements.",
    options:[
      {text:"Data Owner, because the business side defines the classification and required protection level.",value:1,category:"role_confusion"},
      {text:"Data Controller, because payroll information includes personal data and processing decisions.",value:0.5,category:"privacy_role_confusion"},
      {text:"Data Custodian, because encryption and storage controls are part of the scenario.",value:0,category:"role_confusion"},
      {text:"Data Steward, because labeling and records quality are mentioned indirectly.",value:0,category:"role_confusion"}
    ],
    traps:"Custodian implements controls but does not decide classification. Steward focuses on data quality and metadata, not ultimate classification authority."
  },
  {
    q:"An external payroll provider calculates employee payments only under the instructions of the HR department. That role/control/state/concept is:",
    category:"privacy_role_confusion",
    messer:"Controller decides why and how personal data is processed. Processor performs processing on behalf of the controller.",
    whyCorrect:"The provider performs processing under another party's instructions, which is the Processor role.",
    partialWhy:"A Data Custodian can manage storage or technical controls, but the keyword is processing on behalf of HR.",
    options:[
      {text:"Data Processor, because it performs payroll processing under the controller's direction.",value:1,category:"privacy_role_confusion"},
      {text:"Data Custodian, because it may operate systems where employee records are stored.",value:0.5,category:"role_confusion"},
      {text:"Data Controller, because it handles personal employee information during payroll.",value:0,category:"privacy_role_confusion"},
      {text:"Data Owner, because payroll records have business value and confidentiality needs.",value:0,category:"role_confusion"}
    ],
    traps:"Controller decides purpose and means. Owner classifies and owns accountability. The provider is executing instructions."
  },
  {
    q:"A stolen laptop is powered off, and the company wants to protect all files stored on the internal drive. That role/control/state/concept is:",
    category:"data_state_confusion",
    messer:"Full Disk Encryption protects data at rest, especially when a device is powered off or the drive is removed.",
    whyCorrect:"The keywords are powered off and internal drive. This is stored data protected by FDE.",
    partialWhy:"File-level encryption can protect selected files, but the scenario says all files on the internal drive.",
    options:[
      {text:"Full Disk Encryption for data at rest on the device.",value:1,category:"data_state_confusion"},
      {text:"File-level encryption for selected sensitive files on the device.",value:0.5,category:"control_mismatch"},
      {text:"TLS for data moving between the laptop and a server.",value:0,category:"control_mismatch"},
      {text:"Endpoint DLP for blocking copied files while the user is active.",value:0,category:"dlp_confusion"}
    ],
    traps:"TLS protects transit. Endpoint DLP controls active movement, not powered-off stored drive protection."
  },
  {
    q:"A web application sends customer payment details from a browser to an API endpoint over the network. That role/control/state/concept is:",
    category:"data_state_confusion",
    messer:"Data in transit is actively moving over a network and is commonly protected with TLS, HTTPS, VPN, or IPSec.",
    whyCorrect:"The hidden keyword is sends over the network. This is data in transit.",
    partialWhy:"Data in use may also occur in the browser or API during processing, but the question focuses on network movement.",
    options:[
      {text:"Data in Transit, protected with TLS or HTTPS for the communication channel.",value:1,category:"data_state_confusion"},
      {text:"Data in Use, because the browser and API may process the values.",value:0.5,category:"data_state_confusion"},
      {text:"Data at Rest, because payment information may later be stored in a database.",value:0,category:"data_state_confusion"},
      {text:"Storage DLP, because payment data can exist on servers.",value:0,category:"dlp_confusion"}
    ],
    traps:"Storage DLP and data at rest are plausible later, but the question is about active movement across the network."
  },
  {
    q:"Attackers steal card data from a point-of-sale system's RAM even though disk encryption and TLS are already deployed. That role/control/state/concept is:",
    category:"data_state_confusion",
    messer:"Target-style PoS RAM scraping is a data in use attack. Data must be readable in memory while being processed.",
    whyCorrect:"The keyword is RAM. Data being processed in memory is data in use.",
    partialWhy:"Endpoint controls are relevant mitigation, but the question asks what state/concept the attack represents.",
    options:[
      {text:"Data in Use attack, because decrypted values were accessed from memory during processing.",value:1,category:"data_state_confusion"},
      {text:"Endpoint security gap, because process monitoring could reduce this type of exposure.",value:0.5,category:"control_mismatch"},
      {text:"Data in Transit failure, because TLS failed to encrypt the payment channel.",value:0,category:"data_state_confusion"},
      {text:"Data at Rest failure, because disk encryption did not protect the stored database.",value:0,category:"data_state_confusion"}
    ],
    traps:"TLS and disk encryption can both be correctly deployed while RAM remains the exposed state."
  },
  {
    q:"A payment system replaces a card number with a meaningless substitute stored in a vault mapping system. That role/control/state/concept is:",
    category:"technique_confusion",
    messer:"Tokenization replaces sensitive data with a value that has no mathematical relationship to the original. Encryption mathematically transforms data.",
    whyCorrect:"The keywords are meaningless substitute and vault mapping. That is tokenization.",
    partialWhy:"Encryption can protect payment data, but it uses cryptographic transformation and keys, not a vault mapping substitute.",
    options:[
      {text:"Tokenization, because the substitute has no mathematical relationship to the original value.",value:1,category:"technique_confusion"},
      {text:"Encryption, because the card number is protected from direct exposure.",value:0.5,category:"technique_confusion"},
      {text:"Hashing, because the original value is replaced by a derived output.",value:0,category:"technique_confusion"},
      {text:"Masking, because the card number is hidden from normal users.",value:0,category:"technique_confusion"}
    ],
    traps:"Hashing is one-way verification. Masking changes display. The vault mapping is the giveaway."
  },
  {
    q:"A hospital record contains a patient's diagnosis, insurance number, and treatment details. That role/control/state/concept is:",
    category:"regulation_confusion",
    messer:"PHI is health-related PII. HIPAA points to PHI. All PHI is PII, but not all PII is PHI.",
    whyCorrect:"Diagnosis and treatment details linked to a person are protected health information.",
    partialWhy:"PII is valid because the data identifies a person, but PHI is more precise due to the health context.",
    options:[
      {text:"PHI, because the data links a person to health status, treatment, and healthcare information.",value:1,category:"regulation_confusion"},
      {text:"PII, because the record contains information that can identify a specific person.",value:0.5,category:"regulation_confusion"},
      {text:"PCI DSS data, because insurance and payment processing may be involved.",value:0,category:"regulation_confusion"},
      {text:"Trade secret, because hospital records are confidential to the organization.",value:0,category:"regulation_confusion"}
    ],
    traps:"PCI DSS is for cardholder data. Confidentiality does not make something a trade secret."
  },
  {
    q:"An outbound email is blocked because it contains hidden columns with thousands of employee SSNs. That role/control/state/concept is:",
    category:"dlp_confusion",
    messer:"DLP inspects content and can block sensitive data leaving approved channels. A firewall controls connections, not sensitive content.",
    whyCorrect:"The keywords are blocked email and hidden columns with SSNs. This is content-aware DLP.",
    partialWhy:"Email security may scan outbound messages, but the exam concept here is sensitive data loss prevention.",
    options:[
      {text:"Network or email DLP, because sensitive content is detected before leaving the organization.",value:1,category:"dlp_confusion"},
      {text:"Email security filtering, because the message is being inspected before delivery.",value:0.5,category:"control_mismatch"},
      {text:"Firewall rule enforcement, because outbound traffic was blocked.",value:0,category:"dlp_confusion"},
      {text:"Storage DLP, because the spreadsheet contains stored employee information.",value:0,category:"dlp_confusion"}
    ],
    traps:"A firewall may block traffic, but DLP blocks based on sensitive content. Storage DLP scans stored repositories, not outbound email flow."
  }
];

const dragSets = [
  [
    {id:"steward",concept:"Data Steward",definition:"Maintains quality, labeling consistency, and metadata accuracy across records.",messer:"Steward = quality and metadata. Custodian = technical storage and controls."},
    {id:"phi",concept:"PHI",definition:"Health-related personal information connected to care, diagnosis, treatment, or insurance.",messer:"Health context makes it PHI, which is also a form of PII."},
    {id:"rest",concept:"Data at Rest",definition:"Stored information located on drives, databases, backups, archives, or file servers.",messer:"Stored data requires storage-focused protection such as encryption and access controls."},
    {id:"networkdlp",concept:"Network DLP",definition:"Inspects outbound traffic to stop sensitive content from leaving approved channels.",messer:"Network DLP works at the perimeter and focuses on data movement out of the organization."}
  ],
  [
    {id:"token",concept:"Tokenization",definition:"Replaces a sensitive value with a substitute that only a separate vault can map back.",messer:"The substitute has no mathematical relationship to the original."},
    {id:"hash",concept:"Hashing",definition:"Creates a one-way digest used for verification, integrity checks, or password comparison.",messer:"One-way means there is no decryption back to the original input."},
    {id:"custodian",concept:"Data Custodian",definition:"Implements storage security, backups, permissions, and technical protection controls.",messer:"Custodian does the technical work. Owner decides classification and requirements."},
    {id:"geo",concept:"Geofencing",definition:"Uses a virtual location boundary to restrict access based on where a device appears to be.",messer:"Useful support control, but not perfect assurance because location signals can be spoofed."}
  ],
  [
    {id:"endpointdlp",concept:"Endpoint DLP",definition:"Controls local actions such as copying files to USB, printing, or sending data from a device.",messer:"Endpoint DLP focuses on device-level data in use and local transfer attempts."},
    {id:"controller",concept:"Data Controller",definition:"Determines the purpose and means for handling personal information under privacy rules.",messer:"Controller decides why and how processing happens and remains accountable."},
    {id:"masking",concept:"Masking",definition:"Hides part of a visible value while the original may still exist behind the display.",messer:"Presentation hiding is not the same as destroying or encrypting the source."},
    {id:"sovereignty",concept:"Data Sovereignty",definition:"Makes stored information subject to the laws of the country where it physically resides.",messer:"Legal jurisdiction follows the data location, not just headquarters."}
  ],
  [
    {id:"storagedlp",concept:"Storage DLP",definition:"Scans repositories, servers, and databases to find sensitive files kept in unsafe locations.",messer:"Storage DLP maps to data at rest."},
    {id:"processor",concept:"Data Processor",definition:"Performs handling tasks for another party and follows that party's instructions.",messer:"Processor acts on behalf of the controller."},
    {id:"segmentation",concept:"Segmentation",definition:"Separates systems into controlled zones to reduce lateral movement after compromise.",messer:"Segmentation reduces blast radius."},
    {id:"obfuscation",concept:"Obfuscation",definition:"Makes information or logic harder to understand without being a strong primary defense.",messer:"It can supplement controls, but CompTIA treats it as weaker than real protection."}
  ]
];

const phaseC = [
  {
    q:"Why do people think Full Disk Encryption protects a running, unlocked system?",
    correct:"Because the word full sounds like complete protection, even though the drive is already accessible after authentication.",
    truth:"FDE protects stored data when the device is powered off or the drive is removed. Once unlocked, additional endpoint and access controls matter.",
    messer:"FDE protects data at rest, not every active runtime exposure.",
    options:[
      {text:"Because the word full sounds like complete protection, even though the drive is accessible after authentication.",value:1},

/* ===================== GENERIC MCQ ===================== */

function startPhaseA(){
  phase = "A";
  currentIndex = 0;
  selectedOption = null;
  renderQuestion(phaseA[currentIndex],"Phase A — MCQ Recognition",phaseA.length,currentIndex,selectOption,nextStep);
}

function renderQuestion(q,label,total,index,selectFn,nextFn,extraClass=""){
  selectedOption = null;
  currentOptions = shuffle(q.options);
  const visual = q.visual ? `
    <div class="grid2">
      ${q.visual.map(v => `
        <div class="visual-card">
          <strong>${escapeHTML(v[0])}</strong>
          <span>${escapeHTML(v[1])}</span>
        </div>
      `).join("")}
    </div>
  ` : "";
  app.innerHTML = `
    <section class="panel ${extraClass}">
      ${renderProgress(label,total,index)}
      <div class="kicker">${label}</div>
      <h3>${escapeHTML(q.q)}</h3>
      ${visual}
      ${q.hint ? `<button class="btn" onclick="showHint()">Show Hint</button><div id="hintBox" class="messer hidden"><strong>Messer Insight:</strong> ${escapeHTML(q.hint)}</div>` : ""}
      <div class="option-list">
        ${currentOptions.map((o,i)=>`<button class="option" id="opt${i}" onclick="${selectFn.name}(${i})">${escapeHTML(o.text)}</button>`).join("")}
      </div>
      <div id="feedback"></div>
      <div class="actions">
        <span></span>
        <button id="nextBtn" class="btn primary" onclick="${nextFn.name}()" disabled>Continue</button>
      </div>
    </section>
  `;
}

function showHint(){
  const box = document.getElementById("hintBox");
  if(box) box.classList.remove("hidden");
}

function selectOption(index){
  if(selectedOption !== null) return;
  selectedOption = currentOptions[index];
  const q = phase === "A" ? phaseA[currentIndex] : phaseD[currentIndex];
  const correct = getCorrectOption(q.options);
  const partial = getPartialOption(q.options);
  totalQuestions++;

  if(selectedOption.value === 1){
    score += 1;
  } else {
    if(selectedOption.value === 0.5) score += 0.5;
    addError(selectedOption.category || q.category);
    logMistake({
      phase: phase,
      question: q.q,
      selected: selectedOption.text,
      correct: correct.text,
      category: selectedOption.category || q.category,
      trap: selectedOption.value === 0.5 ? q.partialWhy : q.traps,
      correctReason: q.whyCorrect,
      messer: q.messer
    });
  }

  currentOptions.forEach((o,i)=>{
    const btn = document.getElementById("opt"+i);
    btn.disabled = true;
    if(o.value === 1) btn.classList.add("correct");
    else if(i === index && o.value === 0.5) btn.classList.add("partial");
    else if(i === index) btn.classList.add("wrong");
  });

  const status = selectedOption.value === 1 ? `<span class="ok">Correct.</span>` :
                 selectedOption.value === 0.5 ? `<span class="warn">Partial.</span>` :
                 `<span class="bad">Trap selected.</span>`;

  document.getElementById("feedback").innerHTML = `
    <div class="feedback">
      <p>${status}</p>
      <p><strong>Correct answer:</strong> ${escapeHTML(correct.text)}</p>
      <p><strong>Why correct:</strong> ${escapeHTML(q.whyCorrect)}</p>
      <p><strong>Why partial is incomplete:</strong> ${escapeHTML(partial ? q.partialWhy : "No partial credit in this question.")}</p>
      <p><strong>Why traps are wrong:</strong> ${escapeHTML(q.traps || "The traps are technically possible but do not match the precise keyword in this scenario.")}</p>
      <div class="messer"><strong>Messer Insight:</strong> ${escapeHTML(q.messer)}</div>
    </div>
  `;
  document.getElementById("nextBtn").disabled = false;
}

function nextStep(){
  if(phase === "A"){
    currentIndex++;
    if(currentIndex < phaseA.length){
      renderQuestion(phaseA[currentIndex],"Phase A — MCQ Recognition",phaseA.length,currentIndex,selectOption,nextStep);
    } else {
      startPhaseB();
    }
    return;
  }

  if(phase === "D"){
    currentIndex++;
    if(currentIndex < phaseD.length){
      renderQuestion(phaseD[currentIndex],"Phase D — Real Scenarios",phaseD.length,currentIndex,selectOption,nextStep);
    } else {
      prepareMini();
    }
  }
}

/* ===================== PHASE B ===================== */

let dragSetIndex = 0;
let currentDragItems = [];
let currentDropItems = [];

function startPhaseB(){
  phase = "B";
  dragSetIndex = 0;
  renderDragSet();
}

function renderDragSet(){
  checkedDrag = false;
  selectedConceptId = null;
  dragAnswers = {};
  const set = dragSets[dragSetIndex];
  currentDragItems = shuffle(set);
  currentDropItems = shuffle(set);

  app.innerHTML = `
    <section class="panel">
      ${renderProgress("Phase B — Drag & Drop",dragSets.length,dragSetIndex)}
      <div class="kicker">Phase B — Drag & Drop</div>
      <h3>Match each concept to the correct definition.</h3>
      <p>Definitions do not repeat the concept word. Match by meaning, not by keyword laziness. Humanity may yet recover.</p>
      <div class="drag-layout">
        <div class="drag-list">
          ${currentDragItems.map(item=>`
            <div class="drag-item" id="concept-${item.id}" draggable="true" onclick="selectConcept('${item.id}')" ondragstart="dragStart(event,'${item.id}')" ondragend="dragEnd(event)">${escapeHTML(item.concept)}</div>
          `).join("")}
        </div>
        <div class="drag-list">
          ${currentDropItems.map((item,i)=>`
            <div class="drop-item" id="drop-${i}" onclick="placeConcept(${i})" ondragover="dragOver(event)" ondragenter="dragEnter(event,${i})" ondragleave="dragLeave(event,${i})" ondrop="dropConcept(event,${i})">
              <strong>Definition ${i+1}</strong>
              <span>${escapeHTML(item.definition)}</span>
              <div id="placed-${i}" style="margin-top:8px;color:var(--accent)"></div>
            </div>
          `).join("")}
        </div>
      </div>
      <div id="dragFeedback"></div>
      <div class="actions">
        <button class="btn" onclick="clearDrag()">Clear Matches</button>
        <button id="checkDragBtn" class="btn primary" onclick="checkDrag()">Check Matches</button>
        <button id="dragNextBtn" class="btn primary" onclick="nextDrag()" disabled>Continue</button>
      </div>
    </section>
  `;
}

function selectConcept(id){
  if(checkedDrag) return;
  selectedConceptId = id;
  document.querySelectorAll(".drag-item").forEach(el=>el.classList.remove("selected"));
  document.getElementById("concept-"+id).classList.add("selected");
}

function dragStart(event,id){
  if(checkedDrag) return;
  selectedConceptId = id;
  event.dataTransfer.effectAllowed = "move";
  event.dataTransfer.setData("text/plain", id);
  document.querySelectorAll(".drag-item").forEach(el=>el.classList.remove("selected"));
  const concept = document.getElementById("concept-"+id);
  if(concept) concept.classList.add("selected");
}

function dragEnd(){
  document.querySelectorAll(".drop-item").forEach(el=>el.classList.remove("over"));
}

function dragOver(event){
  if(checkedDrag) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = "move";
}

function dragEnter(event,dropIndex){
  if(checkedDrag) return;
  event.preventDefault();
  const drop = document.getElementById("drop-"+dropIndex);
  if(drop) drop.classList.add("over");
}

function dragLeave(event,dropIndex){
  const drop = document.getElementById("drop-"+dropIndex);
  if(drop && !drop.contains(event.relatedTarget)) drop.classList.remove("over");
}

function dropConcept(event,dropIndex){
  if(checkedDrag) return;
  event.preventDefault();
  const id = event.dataTransfer.getData("text/plain") || selectedConceptId;
  if(!id) return;
  selectedConceptId = id;
  const drop = document.getElementById("drop-"+dropIndex);
  if(drop) drop.classList.remove("over");
  placeConcept(dropIndex);
}

function placeConcept(dropIndex){
  if(checkedDrag || !selectedConceptId) return;

  Object.keys(dragAnswers).forEach(key=>{
    if(dragAnswers[key] === selectedConceptId && Number(key) !== dropIndex){
      delete dragAnswers[key];
      const previous = document.getElementById("placed-"+key);
      const previousDrop = document.getElementById("drop-"+key);
      if(previous) previous.innerHTML = "";
      if(previousDrop) previousDrop.classList.remove("filled");
    }
  });

  dragAnswers[dropIndex] = selectedConceptId;
  const item = currentDragItems.find(x=>x.id === selectedConceptId);
  document.getElementById("placed-"+dropIndex).innerHTML = "Selected: " + escapeHTML(item.concept);
  document.getElementById("drop-"+dropIndex).classList.add("filled");
  selectedConceptId = null;
  document.querySelectorAll(".drag-item").forEach(el=>el.classList.remove("selected"));
}

function clearDrag(){
  if(checkedDrag) return;
  dragAnswers = {};
  document.querySelectorAll(".drop-item").forEach(el=>el.classList.remove("filled"));
  currentDropItems.forEach((_,i)=>document.getElementById("placed-"+i).innerHTML = "");
}

function checkDrag(){
  if(checkedDrag) return;
  checkedDrag = true;
  let wrongs = [];
  currentDropItems.forEach((target,i)=>{
    const selectedId = dragAnswers[i];
    const drop = document.getElementById("drop-"+i);
    if(selectedId === target.id){
      drop.classList.add("good");
    } else {
      drop.classList.add("bad");
      const selectedConcept = selectedId ? currentDragItems.find(x=>x.id === selectedId) : null;
      wrongs.push({target,selectedConcept});
      addError("relationship_confusion");
      logMistake({
        phase:"B",
        question:"Match the concept to: " + target.definition,
        selected:selectedConcept ? selectedConcept.concept : "No match selected",
        correct:target.concept,
        category:"relationship_confusion",
        trap:"The selected match does not describe the same responsibility, mechanism, or data context.",
        correctReason:"The correct concept is " + target.concept + " because: " + target.definition,
        messer:target.messer
      });
    }
  });

  const feedback = wrongs.length === 0
    ? `<p><span class="ok">Perfect match set.</span></p>`
    : `<p><span class="bad">${wrongs.length} match issue(s) detected.</span></p>`;

  document.getElementById("dragFeedback").innerHTML = `
    <div class="feedback">
      ${feedback}
      ${currentDropItems.map(item=>`
        <p><strong>${escapeHTML(item.concept)}:</strong> ${escapeHTML(item.definition)}</p>
      `).join("")}
      <div class="messer"><strong>Messer Insight:</strong> Matching depends on function and context, not repeated words.</div>
    </div>
  `;

  document.getElementById("checkDragBtn").disabled = true;
  document.getElementById("dragNextBtn").disabled = false;
}

function nextDrag(){
  dragSetIndex++;
  if(dragSetIndex < dragSets.length){
    renderDragSet();
  } else {
    startPhaseC();
  }
}

/* ===================== PHASE C ===================== */

let trapIndex = 0;
let currentTrapOptions = [];
let trapAnswered = false;

function startPhaseC(){
  phase = "C";
  trapIndex = 0;
  renderTrap();
}

function renderTrap(){
  trapAnswered = false;
  const q = phaseC[trapIndex];
  currentTrapOptions = shuffle(q.options);
  app.innerHTML = `
    <section class="panel">
      ${renderProgress("Phase C — Trap Reasoning",phaseC.length,trapIndex)}
      <div class="kicker">Phase C — Why People Fall For The Trap</div>
      <h3>${escapeHTML(q.q)}</h3>
      <div class="option-list">
        ${currentTrapOptions.map((o,i)=>`<button class="option" id="trapOpt${i}" onclick="selectTrap(${i})">${escapeHTML(o.text)}</button>`).join("")}
      </div>
      <div id="trapFeedback"></div>
      <div class="actions">
        <span></span>
        <button id="trapNextBtn" class="btn primary" onclick="nextTrap()" disabled>Continue</button>
      </div>
    </section>
  `;
}

function selectTrap(index){
  const opt = currentTrapOptions[index];
  const q = phaseC[trapIndex];

  if(opt.value !== 1){
    document.getElementById("trapFeedback").innerHTML = `
      <div class="feedback">
        <p><span class="bad">Try again — this answer does not explain the real confusion.</span></p>
      </div>
    `;
    return;
  }

  trapAnswered = true;
  currentTrapOptions.forEach((o,i)=>{
    const btn = document.getElementById("trapOpt"+i);
    btn.disabled = true;
    if(o.value === 1) btn.classList.add("correct");
  });

  document.getElementById("trapFeedback").innerHTML = `
    <div class="feedback">
      <p><span class="ok">Correct reasoning.</span></p>
      <p><strong>Why people think this:</strong> ${escapeHTML(q.correct)}</p>
      <p><strong>What is actually true:</strong> ${escapeHTML(q.truth)}</p>
      <div class="messer"><strong>Messer Insight:</strong> ${escapeHTML(q.messer)}</div>
    </div>
  `;
  document.getElementById("trapNextBtn").disabled = false;
}

function nextTrap(){
  if(!trapAnswered) return;
  trapIndex++;
  if(trapIndex < phaseC.length){
    renderTrap();
  } else {
    startPhaseD();
  }
}

/* ===================== PHASE D ===================== */

function startPhaseD(){
  phase = "D";
  currentIndex = 0;
  renderQuestion(phaseD[currentIndex],"Phase D — Real Scenarios",phaseD.length,currentIndex,selectOption,nextStep);
}

/* ===================== DECISION ENGINE ===================== */

function prepareMini(){
  if(totalErrors === 0){
    showBossWelcome();
  } else {
    showMiniIntro();
  }
}

/* ===================== ADAPTIVE MINI C ===================== */

function getTopCategories(){
  const entries = Object.entries(errorMap).sort((a,b)=>b[1]-a[1]);
  const cats = entries.map(e=>e[0]);
  const fallback = ["data_state_confusion","role_confusion","technique_confusion"];
  const merged = [...cats,...fallback].filter((v,i,a)=>a.indexOf(v)===i);
  return merged.slice(0,3);
}

function showMiniIntro(){
  const cats = getTopCategories();
  app.innerHTML = `
    <section class="panel">
      <div class="kicker">Adaptive Mini C</div>
      <h2>You need to reinforce these points.</h2>
      <p>These are the exact areas where you struggled. Review them before continuing.</p>
      <div class="grid3">
        ${cats.map(c=>`<div class="pill"><strong>${escapeHTML(c.replaceAll("_"," "))}</strong><span>${errorMap[c] || 0} issue(s) detected.</span></div>`).join("")}
      </div>
      <div style="margin-top:18px">
        ${mistakeLog.map((m,i)=>`
          <div class="mistake-card">
            <div class="kicker">Mistake ${i+1} · Phase ${escapeHTML(m.phase)}</div>
            <p><strong>Question:</strong> ${escapeHTML(m.question)}</p>
            <p style="color:var(--danger)"><strong>Your answer:</strong> ${escapeHTML(m.selected)}</p>
            <p style="color:var(--green)"><strong>Correct answer:</strong> ${escapeHTML(m.correct)}</p>
            <p><strong>Error category:</strong> ${escapeHTML(m.category)}</p>
            <p><strong>Why this was a trap:</strong> ${escapeHTML(m.trap)}</p>
            <p><strong>Why correct is best:</strong> ${escapeHTML(m.correctReason)}</p>
            <div class="messer"><strong>Messer Insight:</strong> ${escapeHTML(m.messer)}</div>
          </div>
        `).join("")}
      </div>
      <div class="actions">
        <span></span>
        <button class="btn primary" onclick="startMini()">Start Reinforcement Training</button>
      </div>
    </section>
  `;
}

function startMini(){
  phase = "mini";
  miniQuestions = getTopCategories().map(cat => miniBank[cat]).filter(Boolean);
  while(miniQuestions.length < 3){
    miniQuestions.push(miniBank.control_mismatch);
  }
  miniQuestions = miniQuestions.slice(0,3);
  miniIndex = 0;
  renderMini();
}

function renderMini(){
  const q = miniQuestions[miniIndex];
  currentTrapOptions = shuffle(q.options);
  trapAnswered = false;
  app.innerHTML = `
    <section class="panel">
      ${renderProgress("Adaptive Mini C — Reinforcement",miniQuestions.length,miniIndex)}
      <div class="kicker">Adaptive Mini C</div>
      <h3>${escapeHTML(q.q)}</h3>
      <div class="option-list">
        ${currentTrapOptions.map((o,i)=>`<button class="option" id="miniOpt${i}" onclick="selectMini(${i})">${escapeHTML(o.text)}</button>`).join("")}
      </div>
      <div id="miniFeedback"></div>
      <div class="actions">
        <span></span>
        <button id="miniNextBtn" class="btn primary" onclick="nextMini()" disabled>Continue</button>
      </div>
    </section>
  `;
}

function selectMini(index){
  const opt = currentTrapOptions[index];
  const q = miniQuestions[miniIndex];

  if(opt.value !== 1){
    document.getElementById("miniFeedback").innerHTML = `
      <div class="feedback">
        <p><span class="bad">Try again — this answer does not explain the real confusion.</span></p>
      </div>
    `;
    return;
  }

  currentTrapOptions.forEach((o,i)=>{
    const btn = document.getElementById("miniOpt"+i);
    btn.disabled = true;
    if(o.value === 1) btn.classList.add("correct");
  });

  document.getElementById("miniFeedback").innerHTML = `
    <div class="feedback">
      <p><span class="ok">Correct reasoning.</span></p>
      <p><strong>Why people think this:</strong> ${escapeHTML(q.correct)}</p>
      <p><strong>What is actually true:</strong> ${escapeHTML(q.truth)}</p>
      <div class="messer"><strong>Messer Insight:</strong> ${escapeHTML(q.messer)}</div>
    </div>
  `;
  document.getElementById("miniNextBtn").disabled = false;
}

function nextMini(){
  miniIndex++;
  if(miniIndex < miniQuestions.length){
    renderMini();
  } else {
    showResult(false);
  }
}

/* ===================== BOSS LEVEL ===================== */

function showBossWelcome(){
  app.innerHTML = `
    <section class="panel boss">
      <div class="kicker">Flawless Run Detected</div>
      <div class="boss-title">Welcome to the Boss Level.</div>
      <p>You completed every scoring phase without mistakes. Now we test your real level.</p>
      <div class="messer" style="border-left-color:var(--gold);color:var(--gold);background:rgba(255,211,106,.08)">
        <strong>Unlocked:</strong> ⚠️ THE BOSS LEVEL ⚠️
      </div>
      <div class="actions">
        <span></span>
        <button class="btn gold" onclick="startBoss()">Enter Boss Level</button>
      </div>
    </section>
  `;
}

function startBoss(){
  phase = "boss";
  bossIndex = 0;
  bossScore = 0;
  renderBoss();
}

function renderBoss(){
  const q = bossQuestions[bossIndex];
  currentOptions = shuffle(q.options);
  selectedOption = null;
  app.innerHTML = `
    <section class="panel boss">
      ${renderProgress("Boss Level",bossQuestions.length,bossIndex)}
      <div class="boss-title">⚠️ THE BOSS LEVEL ⚠️</div>
      <h3>${escapeHTML(q.q)}</h3>
      <div class="grid2">
        ${q.visual.map(v=>`
          <div class="visual-card">
            <strong style="color:var(--gold)">${escapeHTML(v[0])}</strong>
            <span>${escapeHTML(v[1])}</span>
          </div>
        `).join("")}
      </div>
      <div class="option-list">
        ${currentOptions.map((o,i)=>`<button class="option" id="bossOpt${i}" onclick="selectBoss(${i})">${escapeHTML(o.text)}</button>`).join("")}
      </div>
      <div id="bossFeedback"></div>
      <div class="actions">
        <span></span>
        <button id="bossNextBtn" class="btn gold" onclick="nextBoss()" disabled>Continue</button>
      </div>
    </section>
  `;
}

function selectBoss(index){
  if(selectedOption !== null) return;
  selectedOption = currentOptions[index];

  if(selectedOption.value === 1){
    bossScore++;
  }

  currentOptions.forEach((o,i)=>{
    const btn = document.getElementById("bossOpt"+i);
    btn.disabled = true;
    if(o.value === 1) btn.classList.add("correct");
    else if(i === index) btn.classList.add("wrong");
  });

  const q = bossQuestions[bossIndex];
  const correct = getCorrectOption(q.options);

  document.getElementById("bossFeedback").innerHTML = `
    <div class="feedback">
      <p>${selectedOption.value === 1 ? `<span class="ok">Correct.</span>` : `<span class="bad">Trap selected.</span>`}</p>
      <p><strong>Correct answer:</strong> ${escapeHTML(correct.text)}</p>
      <p><strong>Explanation:</strong> ${escapeHTML(q.explanation)}</p>
      <div class="messer" style="border-left-color:var(--gold);color:var(--gold);background:rgba(255,211,106,.08)">
        <strong>Messer Insight:</strong> ${escapeHTML(q.messer)}
      </div>
    </div>
  `;
  document.getElementById("bossNextBtn").disabled = false;
}

function nextBoss(){
  bossIndex++;
  if(bossIndex < bossQuestions.length){
    renderBoss();
  } else {
    showResult(true);
  }
}

/* ===================== RESULT ===================== */

function showResult(boss=false){
  const percent = totalQuestions === 0 ? 0 : (score / totalQuestions) * 100;
  let message = "";
  let resultClass = "";

  if(boss){
    message = "Boss Level Completed";
    resultClass = "boss";
  } else if(percent >= PASSING_SCORE){
    message = "Passed";
  } else {
    message = "Retry required";
  }

  app.innerHTML = `
    <section class="panel ${resultClass}">
      <div class="kicker">Final Result</div>
      <h2>${message}</h2>
      <div class="stat-row">
        <div class="stat"><strong>${percent.toFixed(0)}%</strong><span>Scoring phase result</span></div>
        <div class="stat"><strong>${score}/${totalQuestions}</strong><span>Score points</span></div>
        <div class="stat"><strong>${totalErrors}</strong><span>Total errors tracked</span></div>
      </div>
      ${boss ? `
        <div class="messer" style="border-left-color:var(--gold);color:var(--gold);background:rgba(255,211,106,.08)">
          <strong>Boss Performance:</strong> ${bossScore}/${bossQuestions.length} hard scenarios correct.
        </div>
      ` : ""}
      ${!boss && percent < PASSING_SCORE ? `
        <div class="feedback">
          <p><span class="bad">Retry required.</span></p>
          <p>You need at least ${PASSING_SCORE}% to pass this phase.</p>
        </div>
      ` : ""}
      ${!boss && percent >= PASSING_SCORE ? `
        <div class="messer"><strong>Passed:</strong> You reached the required score. Boss Level still requires a flawless run with zero tracked errors.</div>
      ` : ""}
      <div class="actions">
        <button class="btn" onclick="location.reload()">Retry Phase 2</button>
        <button class="btn primary" onclick="goBack()">Back to Week 2</button>
      </div>
    </section>
  `;
}

renderIntro();
</script>
</body>
</html>
