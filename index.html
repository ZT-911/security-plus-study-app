<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security+ Study App</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0e1a;
  --surface:#111827;
  --surface2:#1a2235;
  --border:#1e2d45;
  --accent:#00d4ff;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --mono:'Space Mono', monospace;
  --sans:'DM Sans', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  border-bottom:1px solid var(--border);
}

.logo{
  font-family:var(--mono);
  font-size:13px;
  letter-spacing:2px;
  color:var(--accent);
}

.badge{
  font-size:10px;
  border:1px solid var(--border);
  padding:4px 10px;
  border-radius:100px;
  color:var(--text2);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:36px;
  margin-bottom:10px;
}

.hero p{
  font-size:14px;
  color:var(--text2);
}

/* WEEK */
.weeks{
  max-width:600px;
  margin:40px auto;
}

.week-card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

.btn{
  margin-top:10px;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid var(--border);
  cursor:pointer;
  background:transparent;
  color:var(--text2);
}

.btn:hover{
  background:var(--surface2);
}

.btn-primary{
  border-color:var(--accent);
  color:var(--accent);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{display:flex;}

.modal-box{
  background:var(--surface);
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
}

.footer{
  text-align:center;
  font-size:11px;
  color:var(--text2);
  margin:40px 0;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">⬡ SEC+ SY0-701</div>
  <div class="badge">● STUDY APP</div>
</div>

<div class="hero">
  <h1>Study smarter</h1>
  <p>Complete Week 1 to unlock Week 2</p>
</div>

<div class="weeks">

  <div class="week-card">
    <h3>WEEK 01</h3>
    <button class="btn btn-primary" onclick="goWeek1()">Enter Week 1</button>
  </div>

  <div class="week-card">
    <h3>WEEK 02 (LOCKED)</h3>
    <button class="btn" onclick="openModal()">Enter Code</button>
  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">

    <div class="modal-top">
      <h3>Golden Ticket</h3>
      <button class="btn" onclick="goBackHome()">← Back</button>
    </div>

    <input id="codeInput" placeholder="SEC+-W2-PLAT-XXXX">

    <button class="btn btn-primary" onclick="unlock()">Unlock</button>

  </div>
</div>

<div class="footer">
  Built by Carlos Materano · 2026
</div>

<script>

function goWeek1(){
  window.location.href="week1.html";
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function goBackHome(){
  window.location.href="index.html";
}

function unlock(){
  const code=document.getElementById("codeInput").value.trim();

  if(code.startsWith("SEC+-W2-PLAT")){
    sessionStorage.setItem("w2_unlocked","true");
    window.location.href="week2.html";
  }else{
    alert("Invalid Code");
  }
}

/* ESC → vuelve al menú */
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    goBackHome();
  }
});

/* Click fuera → solo cierra modal */
document.getElementById("modal").addEventListener("click",function(e){
  if(e.target.id==="modal"){
    closeModal();
  }
});

/* ENTER → unlock */
document.getElementById("codeInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    unlock();
  }
});

</script>

</body>
</html>
