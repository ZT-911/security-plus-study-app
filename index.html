<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security+ Study App</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0e1a;
  color:#e2e8f0;
  font-family:'DM Sans',sans-serif;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:36px;
}

/* WEEK */
.weeks{
  max-width:600px;
  margin:40px auto;
}

.week-card{
  background:#111827;
  border:1px solid #1e2d45;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

.btn{
  margin-top:10px;
  padding:10px 16px;
  border-radius:8px;
  border:1px solid #1e2d45;
  cursor:pointer;
  background:transparent;
  color:#94a3b8;
}

.btn:hover{
  background:#1a2235;
}

.btn-primary{
  border-color:#00d4ff;
  color:#00d4ff;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal.active{display:flex;}

.modal-box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

/* NUEVO: BACK BUTTON */
.back-btn{
  margin-bottom:10px;
  background:transparent;
  border:none;
  color:#00d4ff;
  cursor:pointer;
  font-size:14px;
}

.back-btn:hover{
  text-decoration:underline;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#1a2235;
  border:1px solid #1e2d45;
  color:#e2e8f0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Study smarter</h1>
</div>

<div class="weeks">

  <div class="week-card">
    <h3>WEEK 01</h3>
    <button class="btn btn-primary" onclick="goWeek1()">Enter Week 1</button>
  </div>

  <div class="week-card">
    <h3>WEEK 02</h3>
    <button class="btn" onclick="openModal()">Enter Code</button>
  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-box">

    <!-- 🔥 BOTÓN BACK REAL -->
    <button class="back-btn" onclick="closeModal()">← Back to Menu</button>

    <h3>Golden Ticket</h3>

    <input id="codeInput" placeholder="SEC+-W2-PLAT-XXXX">

    <button class="btn btn-primary" onclick="unlock()">Unlock</button>

  </div>
</div>

<script>

function goWeek1(){
  window.location.href="week1.html";
}

function openModal(){
  document.getElementById("modal").classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

function unlock(){
  const code=document.getElementById("codeInput").value.trim();

  if(code.startsWith("SEC+-W2-PLAT")){
    sessionStorage.setItem("w2_unlocked","true");
    window.location.href="week2.html";
  }else{
    alert("Invalid Code");
  }
}

</script>

</body>
</html>
