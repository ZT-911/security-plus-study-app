<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security+ Training Pro</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: white;
  margin: 0;
}

header {
  padding: 10px;
  background: #161b22;
  position: fixed;
  width: 100%;
  top: 0;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.container {
  padding: 80px 20px;
}

.hidden { display: none; }

.progress {
  height: 10px;
  background: green;
  width: 0%;
}

.locked { opacity: 0.4; pointer-events: none; }

.question { margin: 20px 0; }
</style>
</head>

<body>

<header>
<button onclick="showMenu()">☰ Chapters</button>
</header>

<div class="container">

<!-- MENU -->
<div id="menu"></div>

<!-- VIDEO -->
<div id="videoSection" class="hidden">
<h2 id="chapterTitle"></h2>
<iframe id="videoFrame" width="100%" height="400"></iframe>

<button onclick="startTheory()">Skip</button>
<button onclick="startTheory()">Start Theory</button>

<p><a id="ytLink" target="_blank">Watch later</a></p>
</div>

<!-- THEORY -->
<div id="theorySection" class="hidden">
<div class="progress" id="progressBar"></div>
<p id="theoryContent"></p>
<button onclick="prevTheory()">Previous</button>
<button onclick="nextTheory()">Next</button>
</div>

<!-- QUIZ -->
<div id="quizSection" class="hidden">
<h2>Quiz</h2>
<div id="quizContainer"></div>
<button onclick="submitQuiz()">Submit</button>
</div>

<!-- EXERCISES -->
<div id="exerciseSection" class="hidden">
<h2>Exercises</h2>
<div id="exerciseContainer"></div>
</div>

<!-- FINAL -->
<div id="finalSection" class="hidden">
<h2>Final Scenarios</h2>
<div id="finalExercises"></div>
</div>

<!-- CODE -->
<div id="codeSection" class="hidden">
<h2>🎉 Congratulations</h2>
<p>Your unlock code:</p>
<h1 id="finalCode"></h1>
</div>

</div>

<script>

// ================= DATA =================

let currentChapter = 1;
let theoryStep = 0;

const videos = {
1:"https://www.youtube.com/embed/jcvwsAYRqh8",
2:"https://www.youtube.com/embed/bD2EMsKlJoY",
3:"https://www.youtube.com/embed/vaI7aCsLDbI",
4:"https://www.youtube.com/embed/hnrCYOQiTiM",
5:"https://www.youtube.com/embed/rF_gEMy8iG8"
};

const theory = {
1:["CIA","AAA","Controls","Zero Trust"],
2:["Actors","Motivation","Vectors","Deception"],
3:["Physical","Surveillance","Access","Biometrics"],
4:["Phishing","Triggers","Pretexting","Fraud"],
5:["Malware","Ransomware","Rootkits","IoC"]
};

// SAMPLE QUESTIONS (puedes expandir)
function generateQuestions(ch){
let base = [
"Example Q1","Example Q2","Example Q3","Example Q4","Example Q5",
"Example Q6","Example Q7","Example Q8","Example Q9","Example Q10",
"Example Q11","Example Q12","Example Q13","Example Q14","Example Q15"
];

return shuffle(base).slice(0,10).map(q=>({
q:q,
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}));
}

// ================= MENU =================

function showMenu(){
hideAll();
let html="";
let unlocked = JSON.parse(localStorage.getItem("progress"))||1;

for(let i=1;i<=5;i++){
html+=`<button ${i>unlocked?"class='locked'":""} onclick="startChapter(${i})">
Chapter ${i}</button><br>`;
}

document.getElementById("menu").innerHTML=html;
document.getElementById("menu").classList.remove("hidden");
}

// ================= CHAPTER =================

function startChapter(ch){
currentChapter=ch;
hideAll();

videoFrame.src=videos[ch];
ytLink.href=videos[ch].replace("embed","watch?v=");
chapterTitle.innerText="Chapter "+ch;

videoSection.classList.remove("hidden");
}

// ================= THEORY =================

function startTheory(){
hideAll();
theorySection.classList.remove("hidden");
theoryStep=0;
updateTheory();
}

function updateTheory(){
theoryContent.innerText=theory[currentChapter][theoryStep];
progressBar.style.width=((theoryStep+1)*25)+"%";
}

function nextTheory(){
theoryStep++;
if(theoryStep>=4){ startQuiz(); }
else updateTheory();
}

function prevTheory(){
if(theoryStep>0){ theoryStep--; updateTheory(); }
}

// ================= QUIZ =================

let quiz=[];

function startQuiz(){
hideAll();
quizSection.classList.remove("hidden");

quiz = generateQuestions(currentChapter);

let html="";
quiz.forEach((q,i)=>{
html+=`<div class="question">
<p>${q.q}</p>
${q.a.map((opt,j)=>`
<label><input type="radio" name="q${i}" value="${j}">${opt}</label><br>`).join("")}
</div>`;
});

quizContainer.innerHTML=html;
}

function submitQuiz(){
let score=0;

quiz.forEach((q,i)=>{
let sel=document.querySelector(`input[name="q${i}"]:checked`);
if(sel && parseInt(sel.value)===q.correct){score++;}
});

let percent=(score/quiz.length)*100;

if(percent>=80){
startExercises();
}else{
alert("Failed. New questions generated.");
startQuiz();
}
}

// ================= EXERCISES =================

function startExercises(){
hideAll();
exerciseSection.classList.remove("hidden");

exerciseContainer.innerHTML=`
<p>Scenario: CPU 100%</p>
<img src="https://i.imgur.com/8Km9tLL.png" width="300"><br>
<label><input type="checkbox"> Malware</label><br>
<label><input type="checkbox"> Normal</label><br>
<label><input type="checkbox"> Hardware</label><br>
<button onclick="passChapter()">Submit</button>
`;
}

// ================= FINAL =================

function passChapter(){
let progress = JSON.parse(localStorage.getItem("progress"))||1;

if(currentChapter >= progress){
localStorage.setItem("progress", currentChapter+1);
}

if(currentChapter<5){
startChapter(currentChapter+1);
}else{
startFinal();
}
}

function startFinal(){
hideAll();
finalSection.classList.remove("hidden");

finalExercises.innerHTML=`
<h3>Case 1</h3>
<p>Employee receives urgent phishing email</p>
<button onclick="finish()">Phishing</button>

<h3>Case 2</h3>
<p>Multiple global logins</p>
<button onclick="finish()">Brute Force</button>

<h3>Case 3</h3>
<p>Remote control system</p>
<button onclick="finish()">RAT</button>
`;
}

function finish(){
hideAll();
codeSection.classList.remove("hidden");

let code = generateCode();
localStorage.setItem("finalCode", code);
finalCode.innerText = code;
}

// ================= UTILS =================

function generateCode(){
return "SEC-"+Math.random().toString(36).substring(2,10).toUpperCase();
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function hideAll(){
["menu","videoSection","theorySection","quizSection","exerciseSection","finalSection","codeSection"]
.forEach(id=>document.getElementById(id).classList.add("hidden"));
}

// INIT
showMenu();

</script>

</body>
</html>
