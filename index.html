<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security+ Training Pro</title>

<style>
body { font-family: Arial; background:#0d1117; color:white; }
button { padding:10px; margin:5px; cursor:pointer; }
.hidden { display:none; }
.container { padding:20px; }
</style>

</head>

<body>

<div class="container">

<h1>Security+ Training</h1>

<div id="menu"></div>

<div id="content"></div>

</div>

<script>

// ================= STATE =================
let currentChapter = 1;

// ================= VIDEOS =================
const videos = {
1:"https://www.youtube.com/embed/jcvwsAYRqh8",
2:"https://www.youtube.com/embed/bD2EMsKlJoY",
3:"https://www.youtube.com/embed/vaI7aCsLDbI",
4:"https://www.youtube.com/embed/hnrCYOQiTiM",
5:"https://www.youtube.com/embed/rF_gEMy8iG8"
};

// ================= MENU =================

function showMenu(){
let progress = localStorage.getItem("progress") || 1;

let html = "<h2>Chapters</h2>";

for(let i=1;i<=5;i++){
let locked = i>progress ? "disabled" : "";
html += `<button ${locked} onclick="startChapter(${i})">Chapter ${i}</button><br>`;
}

menu.innerHTML = html;
content.innerHTML = "";
}

// ================= START =================

function startChapter(ch){
currentChapter = ch;

content.innerHTML = `
<h2>Chapter ${ch}</h2>

<iframe width="100%" height="300"
src="${videos[ch]}" allowfullscreen></iframe>

<br>
<button onclick="startTheory()">Skip</button>
<button onclick="startTheory()">Start Theory</button>

<p><a href="${videos[ch].replace("embed","watch?v=")}" target="_blank">Watch on YouTube</a></p>
`;
}

// ================= THEORY =================

function startTheory(){
content.innerHTML = `
<h2>Theory</h2>
<p>Study content of Chapter ${currentChapter}</p>
<button onclick="startQuiz()">Go to Quiz</button>
`;
}

// ================= QUIZ =================

function startQuiz(){
let questions = generateQuiz();

let html = "<h2>Quiz (80% required)</h2>";

questions.forEach((q,i)=>{
html += `<p>${q.q}</p>`;
q.a.forEach((opt,j)=>{
html += `<label><input type="radio" name="q${i}" value="${j}">${opt}</label><br>`;
});
});

html += `<button onclick="submitQuiz(${JSON.stringify(questions)})">Submit</button>`;

content.innerHTML = html;
}

function generateQuiz(){
let base = [
"What is phishing?",
"Which is malware?",
"What is CIA triad?",
"Which is a threat actor?",
"What is ransomware?",
"Which is social engineering?",
"What is a botnet?",
"What is a rootkit?",
"What is tailgating?",
"What is MFA?",
"What is IDS?",
"What is IPS?"
];

return shuffle(base).slice(0,10).map(q=>({
q:q,
a:["A","B","C","D"],
correct:Math.floor(Math.random()*4)
}));
}

function submitQuiz(qs){
let correct=0;

qs.forEach((q,i)=>{
let sel=document.querySelector(`input[name="q${i}"]:checked`);
if(sel && parseInt(sel.value)===q.correct){correct++;}
});

let percent=(correct/qs.length)*100;

if(percent>=80){
startExercises();
}else{
alert("Failed. New quiz generated.");
startQuiz();
}
}

// ================= EXERCISES =================

function startExercises(){
loadCase1();
}

// -------- CASE 1 --------
function loadCase1(){
content.innerHTML = `
<h2>Practical Case 1</h2>

<p>A system shows abnormal CPU usage.</p>
<img src="https://i.imgur.com/8Km9tLL.png" width="300"><br>

<p>Select 3 correct answers:</p>

<label><input type="checkbox" value="malware"> Malware infection</label><br>
<label><input type="checkbox" value="cryptominer"> Cryptominer activity</label><br>
<label><input type="checkbox" value="botnet"> Botnet participation</label><br>
<label><input type="checkbox" value="normal"> Normal usage</label><br>
<label><input type="checkbox" value="hardware"> Hardware damage</label><br>

<button onclick="evalCase1()">Submit</button>
`;
}

function evalCase1(){
let selected = getChecked();
let correct = ["malware","cryptominer","botnet"];

let count = selected.filter(x=>correct.includes(x)).length;

if(count >= 2){
loadCase2();
}else{
alert("Try again. New case generated.");
loadCase1();
}
}

// -------- CASE 2 --------
function loadCase2(){
content.innerHTML = `
<h2>Practical Case 2</h2>

<p>User receives urgent email asking credentials.</p>

<label><input type="checkbox" value="phishing"> Phishing attack</label><br>
<label><input type="checkbox" value="urgency"> Urgency trigger</label><br>
<label><input type="checkbox" value="authority"> Authority trigger</label><br>
<label><input type="checkbox" value="normal"> Normal email</label><br>

<button onclick="evalCase2()">Submit</button>
`;
}

function evalCase2(){
let selected = getChecked();
let correct = ["phishing","urgency","authority"];

let count = selected.filter(x=>correct.includes(x)).length;

if(count >= 2){
loadCase3();
}else{
alert("Try again. New case generated.");
loadCase2();
}
}

// -------- CASE 3 --------
function loadCase3(){
content.innerHTML = `
<h2>Practical Case 3</h2>

<p>Select all correct answers:</p>

<label><input type="checkbox" value="rat"> RAT allows remote control</label><br>
<label><input type="checkbox" value="worm"> Worm spreads automatically</label><br>
<label><input type="checkbox" value="trojan"> Trojan tricks user</label><br>
<label><input type="checkbox" value="false"> Firewall is malware</label><br>

<button onclick="evalCase3()">Submit</button>
`;
}

function evalCase3(){
let selected = getChecked();
let correct = ["rat","worm","trojan"];

let count = selected.filter(x=>correct.includes(x)).length;
let percent = (count / correct.length) * 100;

if(percent >= 70){
passChapter();
}else{
alert("Try again.");
loadCase3();
}
}
